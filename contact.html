<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Mark Gonzalez</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo">Mark Gonzalez</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Projects</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
    </header>

    <main class="contact-main">
      <div class="contact-inner">
        <h1 class="contact-heading">Get in Touch</h1>
        <p class="contact-sub">
          Have a project in mind or just want to say hello? Send me a message
          and I'll get back to you as soon as I can.
        </p>

        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your name"
              required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="6"
              placeholder="What's on your mind?"
              required></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
          <p class="form-status" id="formStatus" aria-live="polite"></p>
        </form>

      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="mailto:ma132944@ucf.edu" class="footer-link">Email</a>
        <a
          href="https://github.com/spulsion"
          target="_blank"
          rel="noopener"
          class="footer-link"
          >GitHub</a
        >
        <a
          href="https://www.linkedin.com/in/mark-gonzalezz32133/"
          target="_blank"
          rel="noopener"
          class="footer-link"
          >LinkedIn</a
        >
      </div>
      <p>&copy; <span id="year"></span> Mark Gonzalez</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
